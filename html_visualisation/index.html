<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Audio Orb</title>

        <style>
            body {
                margin: 0;
                overflow: hidden;
                background: #eef3f8;
            }
        </style>
    </head>

    <body>
        <script type="module">
            import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js";

            const scene = new THREE.Scene();

            const camera = new THREE.PerspectiveCamera(
                60,
                innerWidth / innerHeight,
                0.1,
                1000,
            );

            camera.position.z = 3;

            const renderer = new THREE.WebGLRenderer({
                antialias: true,
                alpha: true,
            });

            renderer.setSize(innerWidth, innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1.4));

            const light = new THREE.PointLight(0x66ccff, 2);
            light.position.set(3, 3, 3);
            scene.add(light);

            const geometry = new THREE.SphereGeometry(1, 128, 128);

            const material = new THREE.ShaderMaterial({
                transparent: true,
                depthWrite: false,

                uniforms: {
                    time: { value: 0 },
                    audio: { value: 0 },
                },

                vertexShader: `
        uniform float time;
        uniform float audio;

        varying vec3 vNormal;

        float noise(vec3 p){
            return sin(p.x*3.0 + time)
                 + sin(p.y*2.0 + time*1.2)
                 + sin(p.z*4.0 + time*0.8);
        }

        void main() {

            vNormal = normal;

            float n = noise(position * 1.2);

            float displacement =
                n * 0.05 * audio;

            vec3 newPosition =
                position + normal * displacement;

            gl_Position =
                projectionMatrix *
                modelViewMatrix *
                vec4(newPosition, 1.0);
        }
    `,

                fragmentShader: `
        varying vec3 vNormal;

        void main() {

            float fresnel =
                pow(1.0 - abs(dot(vNormal, vec3(0.0,0.0,1.0))), 2.0);

            vec3 colorA = vec3(1.0);
            vec3 colorB = vec3(0.0, 0.65, 1.0);

            vec3 color = mix(colorA, colorB, fresnel);

            // IMPORTANT: visible transparency (not invisible)
            float alpha = 0.35 + fresnel * 0.35;

            gl_FragColor = vec4(color, alpha);
        }
    `,
            });

            const orb = new THREE.Mesh(geometry, material);
            scene.add(orb);

            // =========================================================
            // WEBSOCKET AUDIO (replaces getUserMedia)
            // =========================================================
            const dataArray = new Uint8Array(256);
            let wsConnected = false;

            const ws = new WebSocket("ws://localhost:8765");

            ws.onopen = () => {
                wsConnected = true;
                console.log("WebSocket audio connected");
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (typeof data.audio === "number") {
                        // Fill dataArray so the rest of the code works unchanged
                        const val = Math.min(255, Math.max(0, Math.floor(data.audio)));
                        dataArray.fill(val);
                    }
                } catch {
                    // ignore
                }
            };

            ws.onclose = () => {
                wsConnected = false;
                console.log("WebSocket disconnected");
            };

            function animate(t) {
                requestAnimationFrame(animate);

                let avg = 0;
                for (let i = 0; i < dataArray.length; i++) {
                    avg += dataArray[i];
                }
                avg /= dataArray.length;

                material.uniforms.time.value = t * 0.001;
                material.uniforms.audio.value = avg / 128.0;

                // fluid motion
                orb.rotation.y += 0.002;
                orb.rotation.x += 0.001;

                const scale = 1 + avg * 0.0015;
                orb.scale.setScalar(scale);

                renderer.render(scene, camera);
            }

            animate();

            addEventListener("resize", () => {
                camera.aspect = innerWidth / innerHeight;
                camera.updateProjectionMatrix();

                renderer.setSize(innerWidth, innerHeight);
            });
        </script>
    </body>
</html>
